name: Build & Publish borkanie/protonvpn Image

on:
  push:
    branches: ["main"]
    paths:
      - Backend/Docker/ProtonVPN/**
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    environment: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Backend/Docker/ProtonVPN
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            borkanie/protonvpn:latest
            borkanie/protonvpn:${{ github.sha }}

      - name: Done
        run: echo "borkanie/protonvpn pushed (latest + ${{ github.sha }})"
