name: Build & Publish populate-laws Image

on:
  push:
    branches: ["main"]
    paths:
      - Backend/Scripts/Populate-laws/**
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug

jobs:
  build-and-push:
    name: Build and push Docker image (cloud)
    runs-on: ubuntu-latest
    environment: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: Backend/Scripts/Populate-laws
          push: true
          tags: |
            borkanie/populate-laws:latest
            borkanie/populate-laws:${{ github.sha }}

      - name: Image pushed
        run: echo "Image borkanie/populate-laws pushed (latest + ${{ github.sha }})"


  deploy-local:
    name: Pull latest image and (re)start container on self-hosted runner
    needs: build-and-push
    runs-on: self-hosted
    environment: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull image and restart containers
        env:
          DBName: ${{ secrets.DBName }}
          DBUser: ${{ secrets.DBUser }}
          DBPassword: ${{ secrets.DBPassword }}
          DBServerAddress: ${{ secrets.DBServerAddress }}
          IMAGE_NAME: borkanie/populate-laws:latest
        run: |
          set -e
          echo "Pulling latest image $IMAGE_NAME..."
          docker pull $IMAGE_NAME

          echo "Starting services via docker compose..."
          docker compose -f Backend/Scripts/Populate-laws/docker-compose.yml up -d --remove-orphans

          echo "Services status:"
          docker compose -f Backend/Scripts/Populate-laws/docker-compose.yml ps
